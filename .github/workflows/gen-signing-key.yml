name: generate-apk-signing-key

on:
  workflow_dispatch:

jobs:
  gen-key:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate EC key pair
        run: |
          openssl ecparam -name prime256v1 -genkey -noout -out substore-priv.pem
          openssl ec -in substore-priv.pem -pubout -out substore-pub.pem
          echo "密钥生成完毕"
          ls -lh substore-priv.pem substore-pub.pem

      - name: Store private key as repo secret
        env:
          GH_TOKEN: ${{ secrets.BOOTSTRAP_PAT }}
        run: |
          gh secret set APK_SIGN_KEY < substore-priv.pem
          echo "私钥已写入 Secrets: APK_SIGN_KEY"

      - name: Upload public key as artifact
        uses: actions/upload-artifact@v4
        with:
          name: substore-public-key
          path: substore-pub.pem

      - name: Cleanup private key from runner
        run: |
          shred -u substore-priv.pem 2>/dev/null || rm -f substore-priv.pem
          echo "runner本地私钥已清除"
