name: luci-app-substore-apk

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 zstd

      - name: Download OpenWrt SDK
        run: |
          wget -q "https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* openwrt-sdk

      - name: Setup feeds
        run: |
          cd openwrt-sdk
          ./scripts/feeds update luci
          ./scripts/feeds install -a -p luci

      - name: Download Sub-Store backend and frontend
        run: |
          mkdir -p src/root/usr/libexec/substore
          mkdir -p src/root/www/sub-store
          wget -q -O src/root/usr/libexec/substore/sub-store.bundle.js \
            https://github.com/sub-store-org/Sub-Store/releases/latest/download/sub-store.bundle.js
          wget -q -O /tmp/dist.zip \
            https://github.com/sub-store-org/Sub-Store-Front-End/releases/latest/download/dist.zip
          unzip -q /tmp/dist.zip -d src/root/www/sub-store

      - name: Copy package
        run: |
          cp -r src openwrt-sdk/package/luci-app-substore

      - name: Build
        run: |
          cd openwrt-sdk
          make defconfig
          make package/luci-app-substore/compile V=s 2>&1 | tail -80

      - name: Prepare signing key
        run: |
          echo "${{ secrets.APK_SIGN_KEY }}" > /tmp/private-key.pem
          openssl ec -in /tmp/private-key.pem -pubout -out /tmp/substore-pub.pem

      - name: Build signed repo index
        run: |
          set -e
          REPO_DIR=repo-new/openwrt-25.12/aarch64_cortex-a53
          mkdir -p "$REPO_DIR"
          find openwrt-sdk/bin -name "luci-app-substore*.apk" -exec cp {} "$REPO_DIR/" \;
          ls -lh "$REPO_DIR"

          APK_BIN=$(find openwrt-sdk/staging_dir -type f -name apk -path "*/host/bin/*" | head -n1)
          echo "Using apk binary: $APK_BIN"

          mkdir -p /tmp/keys
          cp /tmp/substore-pub.pem /tmp/keys/

          cd "$REPO_DIR"
          "$GITHUB_WORKSPACE/$APK_BIN" mkndx \
            --keys-dir /tmp/keys \
            --allow-untrusted \
            --sign /tmp/private-key.pem \
            --output packages.adb \
            *.apk
          ls -lh

      - name: Merge with existing live site
        run: |
          mkdir -p site
          wget -r -np -nH --cut-dirs=0 -P site \
            "https://substore-openwrt.pages.dev/" 2>/dev/null || echo "首次部署，线上暂无内容，跳过合并"
          rm -rf site/index.html* site/*.tmp 2>/dev/null || true
          cp -r repo-new/* site/ 2>/dev/null || true
          mkdir -p site
          cp -r repo-new/openwrt-25.12 site/
          cp /tmp/substore-pub.pem site/substore-pub.pem
          ls -R site

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: substore-openwrt
          directory: site

      - name: Cleanup key
        run: |
          shred -u /tmp/private-key.pem 2>/dev/null || rm -f /tmp/private-key.pem
