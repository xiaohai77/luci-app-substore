name: generate-ipk-signing-key

on:
  workflow_dispatch:

jobs:
  gen-key:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWrt SDK (for usign tool)
        run: |
          wget -q "https://downloads.openwrt.org/releases/23.05.3/targets/x86/64/openwrt-sdk-23.05.3-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz" -O sdk.tar.xz
          tar -xf sdk.tar.xz
          mv openwrt-sdk-* openwrt-sdk

      - name: Locate usign binary
        run: |
          USIGN_BIN=$(find openwrt-sdk -type f -name usign -path "*/host/bin/*" | head -n1)
          if [ -z "$USIGN_BIN" ]; then
            echo "usign未在SDK自带工具里找到，尝试编译tools/usign"
            cd openwrt-sdk
            make tools/usign/compile V=s 2>&1 | tail -50
            cd ..
            USIGN_BIN=$(find openwrt-sdk -type f -name usign -path "*/host/bin/*" | head -n1)
          fi
          echo "USIGN_BIN=$USIGN_BIN" >> $GITHUB_ENV
          echo "找到 usign: $USIGN_BIN"

      - name: Generate usign key pair
        run: |
          "$USIGN_BIN" -G -p ipk-sign.pub -s ipk-sign.key
          echo "密钥生成完毕"
          ls -lh ipk-sign.pub ipk-sign.key
          echo "---公钥内容---"
          cat ipk-sign.pub

      - name: Store private key as repo secret
        env:
          GH_TOKEN: ${{ secrets.BOOTSTRAP_PAT }}
        run: |
          gh secret set IPK_SIGN_KEY < ipk-sign.key
          echo "私钥已写入 Secrets: IPK_SIGN_KEY"

      - name: Upload public key as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-public-key
          path: ipk-sign.pub

      - name: Cleanup private key from runner
        run: |
          shred -u ipk-sign.key 2>/dev/null || rm -f ipk-sign.key
          echo "runner本地私钥已清除"
